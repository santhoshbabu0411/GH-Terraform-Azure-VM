name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

      confirmation:
        description: "Type DESTROY to confirm"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.9.8"
  TF_WORKING_DIRECTORY: terraform
  TF_STATE_RESOURCE_GROUP: rg-terraform-state
  TF_STATE_STORAGE_ACCOUNT: ghterraformazurevm14
  TF_STATE_CONTAINER: tfstate

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIRECTORY }}

    steps:
      - name: Validate confirmation
        if: ${{ inputs.confirmation != 'DESTROY' }}
        run: |
          echo "Confirmation must be exactly DESTROY"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required variables
        env:
          CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$CLIENT_ID" || { echo "AZURE_CLIENT_ID is missing"; exit 1; }
          test -n "$TENANT_ID" || { echo "AZURE_TENANT_ID is missing"; exit 1; }
          test -n "$SUBSCRIPTION_ID" || { echo "AZURE_SUBSCRIPTION_ID is missing"; exit 1; }
          echo "Required Azure variables are available."

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Initialize
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          ARM_USE_AZUREAD: "true"
        run: |
          terraform init \
            -reconfigure \
            -backend-config="resource_group_name=${{ env.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ inputs.environment }}.terraform.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Destroy Plan
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_admin_ssh_public_key: ${{ secrets.ADMIN_SSH_PUBLIC_KEY }}
        run: |
          terraform plan \
            -destroy \
            -var-file="environments/${{ inputs.environment }}.tfvars" \
            -out="destroy.tfplan"

      - name: Terraform Destroy
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: terraform apply -auto-approve destroy.tfplan